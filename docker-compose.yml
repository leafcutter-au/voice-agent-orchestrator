services:
  orchestrator:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54421}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: paia-orchestrator
    ports:
      - "3100:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Server-side Supabase URL — container reaches host via Docker gateway
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - API_SECRET_KEY=${API_SECRET_KEY:-test-secret-key}
      - CALLBACK_AUTH_TOKEN=${CALLBACK_AUTH_TOKEN}
      - DOCKER_SOCKET=/var/run/docker.sock
      - POOL_MIN_WARM=${POOL_MIN_WARM:-2}
      - POOL_WARM_RATIO=${POOL_WARM_RATIO:-0.3}
      - POOL_BUFFER=${POOL_BUFFER:-1}
      - POOL_MAX_IDLE_MINS=${POOL_MAX_IDLE_MINS:-0}
      - POOL_IMAGE=${POOL_IMAGE:-paia-local-audio:latest}
      - POOL_NETWORK=paia-network
      - POOL_ENV_FILE=/etc/paia/agent.env
      - INTERNAL_ORIGIN=http://paia-orchestrator:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${AGENT_ENV_FILE:-.env.agent}:/etc/paia/agent.env:ro
    networks:
      - paia-network
    restart: unless-stopped

networks:
  paia-network:
    external: true
